server:
  port: 8085

spring:
  application:
    name: admin-service

  datasource:
    url: jdbc:postgresql://localhost:5434/admin_db
    username: postgres
    password: '@Alwyn1995'
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# JWT Configuration (same as User Service)
app:
  jwt:
    secret: ZimIDBookingSystemSecretKeyForJWTTokenGeneration2024MustBeAtLeast512BitsLongForHS512Algorithm
    expiration-ms: 28800000  # 8 hours for admin sessions

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    zw.gov.rg.admin: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG